<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style2.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="SB-Mid-client-KQQy-q2EIDVHs3fo"></script>
  <title>Payment</title>
</head>
<body>
  <header>
    <img src="image/logo.png" class="login-logo">
    <div class="language-signup">
      <button class="signup-btn">Sign Up</button>
    </div>
  </header>

  <div class="start-content">
    <p class="wrapper-step">STEP 3 OF 3</p> 
    <h1>Choose How To Pay</h1>
  </div>

  <div class="payment-container">
    <h2>Ringkasan Pembayaran</h2>
    <div class="payment-summary">
      <p><strong>Plan:</strong> <span id="plan-name">-</span></p>
      <p><strong>Harga:</strong> <span id="plan-price">-</span></p>
    </div>
    <button id="pay-button">Bayar Sekarang</button>
  </div>

  <script>
    // Ambil data dari URL atau localStorage
    const urlParams = new URLSearchParams(window.location.search);
    const plan = urlParams.get('plan') || "Premium Plan";
    const price = parseInt(urlParams.get('price') || 225000);
    
    // Ambil email dari localStorage
    const userData = JSON.parse(localStorage.getItem('userData'));
    const email = userData ? userData.email : "guest@example.com";
  
    // Tampilkan data plan dan harga
    document.getElementById("plan-name").textContent = plan;
    document.getElementById("plan-price").textContent = `Rp ${price.toLocaleString("id-ID")}`;
  
    // Fungsi untuk update status pembayaran
    async function updatePaymentStatus() {
      try {
        // Update localStorage
        if (userData) {
          userData.isPaid = true;
          userData.plan = plan;
          userData.price = price;
          localStorage.setItem('userData', JSON.stringify(userData));
        }
        
        // Jika menggunakan Supabase
        if (typeof supabase !== 'undefined') {
          const { data, error } = await supabase
            .from('users')
            .update({ isPaid: true, plan: plan, price: price })
            .eq('email', email);
          
          if (error) throw error;
          console.log('Status pembayaran updated:', data);
        }
      } catch (err) {
        console.error('Gagal update status pembayaran:', err);
      }
    }
  
    // Event listener untuk tombol bayar
    document.getElementById("pay-button").addEventListener("click", function () {
      // Validasi data sebelum pembayaran
      if (!email || !price) {
        alert("Data pembayaran tidak lengkap");
        return;
      }
  
      fetch("http://localhost:3000/create-snap-token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          amount: price,
          customerName: userData?.email.split('@')[0] || "Customer",
          email: email
        })
      })
      .then(res => {
        if (!res.ok) throw new Error("Gagal mendapatkan token pembayaran");
        return res.json();
      })
      .then(data => {
        if (!data.token) throw new Error("Token pembayaran tidak valid");
        
        window.snap.pay(data.token, {
          onSuccess: async function(result){
            alert("Pembayaran berhasil!");
            await updatePaymentStatus();
            window.location.href = "signin.html"; // Redirect ke halaman login
          },
          onPending: function(result){
            alert("Menunggu pembayaran...");
            console.log(result);
          },
          onError: function(result){
            alert("Pembayaran gagal: " + (result.message || "Unknown error"));
            console.error(result);
          },
          onClose: function(){
            alert('Anda menutup popup pembayaran sebelum menyelesaikan.');
          }
        });
      })
      .catch(err => {
        console.error("Error:", err);
        alert("Terjadi kesalahan: " + err.message);
      });
    });
  </script> 
  
  

  <div class="bottom-line"></div>
  <footer class="footer">
    <div class="footer-top">
      <p>Questions? Call <a href="tel:085798061625">085798061625</a></p>
    </div>
    <div class="footer-links">
      <a href="#">FAQ</a>
      <a href="#">Privacy</a>
      <a href="#">Help Center</a>
      <a href="#">Cookie Preferences</a>
      <a href="#">Terms of Use</a>
    </div>
    <div class="footer-lang">
      <select>
        <option>English</option>
        <option>Bahasa Indonesia</option>
      </select>
    </div>
  </footer>
</body>
</html>
