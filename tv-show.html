    <style>
        *{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    list-style: none;
    text-decoration: none;
    font-family: "Manrope", sans-serif;
}
body{
    background: black;
    color: white;
    overflow-x: hidden;
}
img{
    width: 10rem;
}
header{
    width: 90%;
    height: 70%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-radius: 0 0 10px 10px;
    margin: 0 auto;
    backdrop-filter: blur(4px); 
    position: relative;
    z-index: 10;
    animation: fadeIn 0.8s ease-in-out;
}
.logo{
    margin-top: 20px;
    
}
nav .logo{
    display: none;
}
nav ul{
    display: flex;
    background: transparent;
    border-radius: 8px;
    border: 1px solid #EFB036;
    position: relative;
}
nav ul li a{
    color: #BFBFBF;
    display: block;
    margin: 5px 8px;
    padding: 12px 18px;
    transition: 0.2s;
    border-radius: 8px;
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
}
nav ul li a:hover{
    color: white;
    background-color: rgba(239, 176, 54, 0.1);
    color: #fff;
}
nav ul li a.active {
    color: white;
    background: #EFB036;
    padding: 12px 18px; 
}

i{
    color: white;
}
.icon i{
    font-size: 30px;
    padding-left: 20px;
    transition: transform 0.3s ease;
}
.icon i:hover {
    transform: scale(1.2);
    color: #EFB036;
}
.nav-indicator {
    position: absolute;
    height: 100%;
    background-color: #EFB036;
    border-radius: 8px;
    z-index: 0;
    top: 0;
    left: 0;
    width: 0;
    transition: all 0.3s ease;
}

.popular-section h1 {
    font-size: 30px;
    margin-bottom: 2.9rem; 
    margin-left: 3rem;
}

.popular-section {
    margin-top: 3rem;
    margin-bottom: 3rem;
}


/* Tv-show.html */
.tv-content {
    background: url(image/background.jpg) no-repeat center center/cover;
    padding-top: 5rem;
    width: 100%;
    height: 95%;
    z-index: 2;
    margin-top: 1rem;
}

.tv-tittle {
    display: flex;
    gap: 2rem;
    padding-left: 3rem;
    align-items: center;
    margin-top: -1rem;
}

.tv-tittle h1{
    font-size: 50px;
    text-shadow: 0 0 50px black;
}

.tv-tittle select {
    width: 7rem;
    height: 2.5rem;
    border-radius: 3px;
    color: white;
    background-color: rgba(0, 0, 0, 0.2);
    font-weight: 1000;
    text-align: center;
}

.tv-tittle select option {
    background-color: black;
}

.play-tvPage {
    display: flex;
    padding-top: 26.5rem;
    padding-left: 4rem;
    gap: 51rem;
}

    .card-list {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding: 10px;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    scroll-behavior: smooth;
}


.cover-image {
    width: 19rem;
}

/* Comedy */
.comedy-sectioncard {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding: 10px;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    scroll-behavior: smooth;
}



/* Footer */
.footer {
    background-color: #141414;
    color: #b3b3b3;
    padding: 30px 20px;
    text-align: center;
    font-size: 14px;
  }
  
  .footer a {
    color: #b3b3b3;
    text-decoration: none;
    margin: 0 10px;
  }
  
  .footer a:hover {
    text-decoration: underline;
  }
  
  .footer-links {
    margin: 15px 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .footer-lang select {
    background-color: transparent;
    border: 1px solid #b3b3b3;
    color: #b3b3b3;
    padding: 5px 10px;
    margin-top: 10px;
  }
    </style>
</body>
</html>
